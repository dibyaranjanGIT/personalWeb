{% extends 'base.html' %}

{% block title %}Contact — Dibyaranjan Jena{% endblock %}

{% block content %}
<section class="section page">
  <div class="container">
    <div class="section-head">
      <span class="kicker">Contact</span>
      <h2>Let's connect</h2>
      <p>Reach out about projects, collaborations, or just to say hello.</p>
    </div>
    <div class="contact-card">
      <form method="post" action="{{ url_for('contact') }}" class="contact-form">
        <label for="name">Name</label>
        <input type="text" id="name" name="name" placeholder="Your name" required>

        <label for="email">Email</label>
        <input type="email" id="email" name="email" placeholder="you@example.com" required>

        <label for="message">Message</label>
        <textarea id="message" name="message" rows="5" placeholder="What would you like to talk about?" required></textarea>

        <button type="submit" class="btn btn-primary">Send Message</button>
      </form>
    </div>
  </div>
</section>
{% endblock %}
